version: '3.8'

# 优选商城 - 本地开发中间件
# 启动: docker-compose up -d
# 停止: docker-compose down
# 数据持久化目录: ./.docker-data/
#
# 端口占用:
#   MySQL    3306  (账号 root / wineMall@2026)
#   Redis    6379
#   MinIO    9000 (API)  9001 (控制台 http://localhost:9001 minio/minio123456)

services:
  mysql:
    image: mysql:8.0
    container_name: winemall-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: wineMall@2026
      MYSQL_DATABASE: wine_mall
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max_connections=500
      - --innodb-buffer-pool-size=512M
    volumes:
      - ./.docker-data/mysql:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-pwineMall@2026']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: winemall-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - ./.docker-data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: winemall-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    command: server /data --console-address ":9001"
    volumes:
      - ./.docker-data/minio:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 5s
      retries: 3
